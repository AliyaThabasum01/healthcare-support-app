<!DOCTYPE html>
<html>
<head>
    <title>Healthcare Support Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Healthcare Support Portal</h1>

        <form id="healthForm">
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>

            <textarea id="query" placeholder="Describe your health concern" required></textarea>

            <button type="submit">Submit</button>
        </form>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
